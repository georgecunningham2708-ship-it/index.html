<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cutscene</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Special+Elite&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: black;
    color: white;
    overflow: hidden;
  }

  #flash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s;
  }

  #startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    cursor: pointer;
  }

  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  #presents {
    font-size: 36px;
    font-style: italic;
    opacity: 0;
    transition: opacity 2s;
  }

  #mainText {
    font-size: 70px;
    opacity: 0;
    font-family: 'Special Elite';
  }

  #subText {
    font-size: 32px;
    color: orange;
    opacity: 0;
  }

  #credits, #postCredit, #smiley {
    position: absolute;
    width: 100%;
    text-align: center;
    opacity: 0;
    transition: opacity 2s;
  }

  #credits { bottom: 12%; }
  #postCredit { bottom: 5%; }

  #smiley {
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 80px;
  }

  .glitch {
    color: purple;
    animation: glitch 0.1s infinite;
  }

  @keyframes glitch {
    0% { text-shadow: 2px 2px purple; }
    50% { text-shadow: -2px -2px magenta; }
    100% { text-shadow: 2px 2px purple; }
  }

  .cinematic {
    color: orange;
    text-shadow: 0 0 30px orange, 0 0 60px red;
  }

  .outlineGlow {
    color: transparent;
    -webkit-text-stroke: 2px orange;
    text-shadow: 0 0 20px orange, 0 0 40px red;
    opacity: 0.7;
    animation: pulseGlow 1s infinite;
  }

  @keyframes pulseGlow {
    0% { text-shadow: 0 0 10px orange; }
    50% { text-shadow: 0 0 40px red, 0 0 80px orange; }
    100% { text-shadow: 0 0 10px orange; }
  }
</style>

</head>

<body>

<div id="flash"></div>
<div id="startScreen">CLICK TO START</div>

<div class="center">
  <div id="presents">Bloxxer Games and GStudios Presents...</div>
  <div id="mainText">LEGACY</div>
  <div id="subText"></div>
</div>

<div id="credits">Created by: GStudios and Bloxxer</div>
<div id="postCredit">This series will have 7 seasons</div>
<div id="smiley">:)</div>

<audio id="wind" src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_946b6f3b9c.mp3"></audio> <audio id="boom" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_cinematic_hit.mp3"></audio> <audio id="music" src="https://cdn.pixabay.com/download/audio/2022/08/04/audio_cinematic_ambient.mp3"></audio>

<script>
const startScreen = document.getElementById("startScreen");
const presents = document.getElementById("presents");
const main = document.getElementById("mainText");
const sub = document.getElementById("subText");
const credits = document.getElementById("credits");
const post = document.getElementById("postCredit");
const smiley = document.getElementById("smiley");
const flash = document.getElementById("flash");

const wind = document.getElementById("wind");
const boom = document.getElementById("boom");
const music = document.getElementById("music");

startScreen.onclick = () => {
  startScreen.style.display = "none";

  wind.loop = true;
  wind.volume = 0.3;
  wind.play();

  setTimeout(()=>presents.style.opacity=1,500);
  setTimeout(()=>presents.style.opacity=0,3000);

  setTimeout(()=>main.style.opacity=1,3500);

  setTimeout(()=>main.classList.add("glitch"),4500);
  setTimeout(()=>main.style.opacity=0,5500);

  // ✨ Outline build-up
  setTimeout(()=>{
    main.innerText="THE UNSEEN HOUSEHOLD";
    main.className="outlineGlow";
    main.style.opacity=1;
  },6000);

  // 💥 Full cinematic slam
  setTimeout(()=>{
    flash.style.opacity=1;
    boom.play();
    setTimeout(()=>flash.style.opacity=0,100);
    music.volume = 0.6;
    music.play();
    main.className="cinematic";
  },7000);

  setTimeout(()=>{ sub.innerText="BATTLEGROUND"; sub.style.opacity=1; },8500);
  setTimeout(()=>sub.innerText="EPISODE 1",11000);
  setTimeout(()=>sub.innerText="BEGINNING",13000);

  setTimeout(()=>{ main.style.opacity=0; sub.style.opacity=0; credits.style.opacity=1; },16000);
  setTimeout(()=>credits.style.opacity=0,19000);
  setTimeout(()=>post.style.opacity=1,21000);
  setTimeout(()=>{ post.style.opacity=0; smiley.style.opacity=1; },24000);

  // 🔴 Fade to WHITE and end cutscene
  setTimeout(()=>{
    smiley.style.opacity=0;
    flash.style.opacity=1; // full white
    wind.pause();
    music.pause();
    boom.pause();
  },28000);
};
</script>

</body>
</html>
