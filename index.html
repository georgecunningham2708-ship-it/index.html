<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cutscene</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Special+Elite&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: black;
    color: white;
    overflow: hidden;
  }

  #flash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
    pointer-events: none;
  }

  #startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    cursor: pointer;
  }

  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  #presents {
    font-size: 36px;
    font-style: italic;
    opacity: 0;
    transition: opacity 2s;
  }

  #mainText {
    font-size: 70px;
    opacity: 0;
    font-family: 'Special Elite';
  }

  #subText {
    font-size: 32px;
    color: orange;
    opacity: 0;
  }

  #credits, #postCredit, #smiley {
    position: absolute;
    width: 100%;
    text-align: center;
    opacity: 0;
    transition: opacity 2s;
  }

  #credits { bottom: 12%; }
  #postCredit { bottom: 5%; }
  #smiley {
    top: 50%;
    transform: translateY(-50%);
    font-size: 80px;
  }

  .glitch {
    color: purple;
    animation: glitch 0.1s infinite;
  }

  @keyframes glitch {
    0% { transform: translate(-50%, -50%) translate(0,0); }
    50% { transform: translate(-50%, -50%) translate(5px,-5px); }
    100% { transform: translate(-50%, -50%) translate(0,0); }
  }

  .shake {
    animation: shake 0.4s;
  }

  @keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(-15px,10px); }
    50% { transform: translate(15px,-10px); }
    75% { transform: translate(-10px,5px); }
    100% { transform: translate(0,0); }
  }

  .cinematic {
    color: orange;
    text-shadow: 0 0 30px orange, 0 0 60px red;
  }
</style>

</head>

<body>

<div id="flash"></div>
<div id="startScreen">CLICK TO START</div>

<div class="center" id="container">
  <div id="presents">Bloxxer Games and GStudios Presents...</div>
  <div id="mainText">LEGACY</div>
  <div id="subText"></div>
</div>

<div id="credits">Created by: GStudios and Bloxxer</div>
<div id="postCredit">This series will have 7 seasons</div>
<div id="smiley">:)</div>

<!-- AUDIO -->

<audio id="windSound" src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_946b6f3b9c.mp3"></audio> <audio id="boom" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_cinematic_hit.mp3"></audio> <audio id="music" src="https://cdn.pixabay.com/download/audio/2022/08/04/audio_cinematic_ambient.mp3"></audio>

<script>
const startScreen = document.getElementById("startScreen");
const presents = document.getElementById("presents");
const main = document.getElementById("mainText");
const sub = document.getElementById("subText");
const credits = document.getElementById("credits");
const post = document.getElementById("postCredit");
const smiley = document.getElementById("smiley");
const flash = document.getElementById("flash");

const wind = document.getElementById("windSound");
const boom = document.getElementById("boom");
const music = document.getElementById("music");

function shake() {
  document.body.classList.add("shake");
  setTimeout(() => document.body.classList.remove("shake"), 400);
}

startScreen.onclick = () => {
  startScreen.style.display = "none";

  wind.loop = true;
  wind.volume = 0.3;
  wind.play();

  // presents
  setTimeout(()=>presents.style.opacity=1,500);
  setTimeout(()=>presents.style.opacity=0,3000);

  // legacy
  setTimeout(()=>main.style.opacity=1,3500);

  // flicker out
  setTimeout(()=>{
    main.classList.add("glitch");
    shake();
  },4500);

  setTimeout(()=>{
    main.style.opacity=0;
  },5500);

  // SLAM
  setTimeout(()=>{
    flash.style.opacity=1;
    boom.play();
    shake();

    setTimeout(()=>flash.style.opacity=0,100);

    music.volume = 0.6;
    music.play();

    main.innerText="THE UNSEEN MYTH";
    main.classList.add("cinematic");
    main.style.opacity=1;

  },6000);

  setTimeout(()=>{
    sub.innerText="BATTLEGROUND";
    sub.style.opacity=1;
  },7500);

  setTimeout(()=>sub.innerText="EPISODE 1",10000);
  setTimeout(()=>sub.innerText="BEGINNING",12000);

  // fade out all
  setTimeout(()=>{
    main.style.opacity=0;
    sub.style.opacity=0;
    credits.style.opacity=1;
  },15000);

  setTimeout(()=>credits.style.opacity=0,18000);

  setTimeout(()=>{
    post.style.opacity=1;
  },20000);

  setTimeout(()=>{
    post.style.opacity=0;
    smiley.style.opacity=1;
  },23000);

  // FINAL FADE WITH SMILEY
  setTimeout(()=>{
    smiley.style.opacity=0;
    document.body.style.background="black";
  },27000);
};
</script>

</body>
</html>
