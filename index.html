<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cutscene</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Special+Elite&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: black;
    color: white;
    overflow: hidden;
  }

  #startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: opacity 1s;
  }

  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  #presents {
    font-size: 36px;
    font-style: italic;
    font-family: 'Orbitron', sans-serif;
    opacity: 0;
    transition: opacity 2s ease;
  }

  #mainText {
    font-size: 70px;
    opacity: 0;
    font-family: 'Special Elite', monospace;
    transition: opacity 1s ease;
  }

  #subText {
    font-size: 32px;
    margin-top: 20px;
    color: orange;
    opacity: 0;
    font-family: 'Orbitron', sans-serif;
    transition: opacity 1s ease;
  }

  #credits, #postCredit {
    position: absolute;
    width: 100%;
    text-align: center;
    opacity: 0;
    transition: opacity 2s ease;
  }

  #credits {
    bottom: 12%;
    font-size: 28px;
    font-family: 'Orbitron', sans-serif;
    text-shadow: 0 0 10px white, 0 0 20px orange;
  }

  #postCredit {
    bottom: 5%;
    font-size: 20px;
    font-family: 'Special Elite', monospace;
    color: #aaa;
  }

  .glitch {
    color: #a020f0;
    text-shadow: 0 0 10px #a020f0, 0 0 25px purple;
    animation: glitch 0.1s infinite;
  }

  @keyframes glitch {
    0% { transform: translate(-50%, -50%) translate(0px, 0px); }
    25% { transform: translate(-50%, -50%) translate(5px, -5px); }
    50% { transform: translate(-50%, -50%) translate(-5px, 5px); }
    75% { transform: translate(-50%, -50%) translate(3px, -3px); }
    100% { transform: translate(-50%, -50%) translate(0px, 0px); }
  }

  .shake {
    animation: shake 0.3s;
  }

  @keyframes shake {
    0% { transform: translate(0,0); }
    20% { transform: translate(-10px, 5px); }
    40% { transform: translate(10px, -5px); }
    60% { transform: translate(-8px, 4px); }
    80% { transform: translate(8px, -4px); }
    100% { transform: translate(0,0); }
  }

  .cinematic {
    color: orange;
    text-shadow: 0 0 20px orange, 0 0 40px red;
    font-family: 'Orbitron', sans-serif;
  }
</style>

</head>

<body>

<div id="startScreen">CLICK TO START</div>

<div class="center" id="container">
  <div id="presents">Bloxxer Games and GStudios Presents...</div>
  <div id="mainText">LEGACY</div>
  <div id="subText"></div>
</div>

<div id="credits">Created by: GStudios and Bloxxer</div>
<div id="postCredit">This series will have 7 seasons</div>

<!-- NEW WIND SOUND -->

<audio id="windSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5b2c5c9c72.mp3"></audio>

<script>
const startScreen = document.getElementById("startScreen");
const presents = document.getElementById("presents");
const main = document.getElementById("mainText");
const sub = document.getElementById("subText");
const container = document.getElementById("container");
const credits = document.getElementById("credits");
const post = document.getElementById("postCredit");
const windSound = document.getElementById("windSound");

function doShake() {
  container.classList.add("shake");
  setTimeout(() => container.classList.remove("shake"), 300);
}

function fadeOutAudio(audio, duration) {
  let steps = 20;
  let stepTime = duration / steps;
  let volStep = audio.volume / steps;

  let fade = setInterval(() => {
    if (audio.volume > volStep) {
      audio.volume -= volStep;
    } else {
      audio.volume = 0;
      clearInterval(fade);
      audio.pause();
    }
  }, stepTime);
}

startScreen.addEventListener("click", () => {
  startScreen.style.opacity = 0;
  setTimeout(() => startScreen.style.display = "none", 1000);

  windSound.loop = true;
  windSound.volume = 0.4;
  windSound.play();

  setTimeout(() => { presents.style.opacity = 1; }, 500);
  setTimeout(() => { presents.style.opacity = 0; }, 3000);

  setTimeout(() => { main.style.opacity = 1; }, 3500);

  setTimeout(() => {
    main.classList.add("glitch");
    doShake();
  }, 4200);

  setTimeout(() => { main.classList.remove("glitch"); }, 5500);

  setTimeout(() => {
    main.innerText = "THE UNSEEN MYTH";
    main.classList.add("cinematic");
    doShake();
  }, 6000);

  setTimeout(() => {
    sub.innerText = "BATTLEGROUND";
    sub.style.opacity = 1;
    doShake();
  }, 7500);

  setTimeout(() => { sub.innerText = "EPISODE 1"; }, 10000);
  setTimeout(() => { sub.innerText = "BEGINNING"; }, 12000);

  setTimeout(() => {
    main.style.opacity = 0;
    sub.style.opacity = 0;
  }, 14500);

  // credits fade in + out
  setTimeout(() => { credits.style.opacity = 1; }, 16500);
  setTimeout(() => { credits.style.opacity = 0; }, 19500);

  // fade wind out
  setTimeout(() => {
    fadeOutAudio(windSound, 3000);
  }, 20000);

  // post credit fade in + out
  setTimeout(() => { post.style.opacity = 1; }, 22000);
  setTimeout(() => { post.style.opacity = 0; }, 26000);

});
</script>

</body>
</html>
